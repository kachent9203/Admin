<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SWSK 2026 - Admin Panel</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; background: #f0f9ff; padding: 20px; margin: 0; display: flex; flex-direction: column; align-items: center; }
    .admin-container { background: white; padding: 32px; border-radius: 16px; box-shadow: 0 10px 25px rgba(37,99,235,0.1); width: 100%; max-width: 500px; margin-bottom: 24px; }
    h2 { color: #1a2340; margin-top: 0; border-bottom: 2px solid #f0f6ff; padding-bottom: 12px; }
    .form-group { margin-bottom: 16px; }
    label { display: block; font-weight: 600; color: #6b7a9e; margin-bottom: 6px; font-size: 13px; }
    select, input { width: 100%; padding: 10px 12px; border: 2px solid #e2e8f0; border-radius: 8px; font-size: 15px; box-sizing: border-box; }
    select:focus, input:focus { border-color: #2563eb; outline: none; }
    .btn-submit { background: #2563eb; color: white; padding: 12px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 15px; width: 100%; transition: background 0.2s; }
    .btn-submit:hover { background: #1d4ed8; }
    .btn-danger { background: #ef4444; }
    .btn-danger:hover { background: #dc2626; }
    .status-msg { text-align: center; font-weight: bold; margin-top: 12px; min-height: 20px; font-size: 14px; }
    .help-text { font-size: 12px; color: #9ca3af; margin-top: 4px; }
    .row-flex { display: flex; gap: 12px; }
    .row-flex > div { flex: 1; }
  </style>
</head>
<body>

<!-- 1. ส่วนอัปเดตคะแนน -->
<div class="admin-container">
  <h2>🏆 อัปเดตคะแนนกีฬา</h2>
  <div class="form-group">
    <label>เลือกทีม</label>
    <select id="teamId">
      <option value="blue-dragon">🐉 Blue Dragon</option>
      <option value="pink-fox">🦊 Pink Fox</option>
      <option value="orange-lion">🦁 Orange Lion</option>
      <option value="purple-tiger">🐯 Purple Tiger</option>
    </select>
  </div>
  <div class="form-group">
    <label>คะแนนกีฬาสี (บวกเพิ่ม)</label>
    <input type="number" id="addScore" value="0">
  </div>
  <div class="row-flex">
    <div class="form-group"><label>ชนะ (W)</label><input type="number" id="addWins" value="0"></div>
    <div class="form-group"><label>แพ้ (L)</label><input type="number" id="addLosses" value="0"></div>
  </div>
  <button class="btn-submit" onclick="submitScore()" id="btnScore">บันทึกคะแนน</button>
  <div id="statusScore" class="status-msg"></div>
</div>

<!-- 2. ส่วนเพิ่มตารางแข่ง -->
<div class="admin-container">
  <h2>📅 เพิ่มตารางการแข่งขันใหม่</h2>
  <div class="row-flex">
    <div class="form-group"><label>เวลา (เช่น 14:00)</label><input type="text" id="mTime" placeholder="00:00"></div>
    <div class="form-group"><label>กีฬา (ใส่อีโมจิได้)</label><input type="text" id="mSport" placeholder="⚽ Football"></div>
  </div>
  <div class="row-flex">
    <div class="form-group">
      <label>ทีม A</label>
      <select id="mTeamA">
        <option value="Blue Dragon">Blue Dragon</option>
        <option value="Pink Fox">Pink Fox</option>
        <option value="Orange Lion">Orange Lion</option>
        <option value="Purple Tiger">Purple Tiger</option>
      </select>
    </div>
    <div class="form-group">
      <label>ทีม B</label>
      <select id="mTeamB">
        <option value="Pink Fox">Pink Fox</option>
        <option value="Blue Dragon">Blue Dragon</option>
        <option value="Orange Lion">Orange Lion</option>
        <option value="Purple Tiger">Purple Tiger</option>
      </select>
    </div>
  </div>
  <div class="form-group">
    <label>สถานะ</label>
    <select id="mLive">
      <option value="FALSE">Upcoming (ยังไม่แข่ง)</option>
      <option value="TRUE">LIVE 🔴 (กำลังแข่ง)</option>
    </select>
  </div>
  <button class="btn-submit" style="background:#10b981;" onclick="addMatch()" id="btnAddMatch">เพิ่มแมตช์นี้</button>
  <div id="statusAddMatch" class="status-msg"></div>
</div>

<!-- 3. ส่วนลบตารางแข่ง -->
<div class="admin-container">
  <h2>🗑️ ลบตารางการแข่งขัน</h2>
  <div class="form-group">
    <label>เลือกแมตช์ที่ต้องการลบออก</label>
    <select id="deleteMatchSelect">
      <option value="">กำลังโหลดข้อมูล...</option>
    </select>
  </div>
  <button class="btn-submit btn-danger" onclick="deleteMatch()" id="btnDelMatch">ลบแมตช์ที่เลือก</button>
  <div id="statusDelMatch" class="status-msg"></div>
</div>

<script>
  // ใช้ URL เดิมที่คุณใช้งานล่าสุดได้เลยครับ
  const API_URL = "https://script.google.com/macros/s/AKfycbzJcV77q0JBl_quY70s6OiCgZgPBhB7OWOQ4F8lKIyj4QkWx2p6bI5vJ9s70Nyg4y7Q/exec";

  // โหลดรายการแมตช์ทั้งหมดมาใส่ใน Dropdown ให้เลือกลบ
  function loadMatches() {
    const select = document.getElementById('deleteMatchSelect');
    select.innerHTML = '<option value="">กำลังโหลดข้อมูล...</option>';
    
    fetch(API_URL)
      .then(res => res.json())
      .then(data => {
        select.innerHTML = "";
        if(data.matches.length === 0) {
          select.innerHTML = '<option value="">ไม่มีตารางแข่งในระบบ</option>';
          return;
        }
        data.matches.forEach((m, index) => {
          // ใน Google Sheets ข้อมูลเริ่มบรรทัดที่ 2 (บรรทัดแรกเป็น Header)
          // ดังนั้น index 0 ใน Array = แถวที่ 2 ใน Sheet
          const rowIndex = index + 2; 
          const opt = document.createElement('option');
          opt.value = rowIndex;
          const liveTxt = m.live ? "[LIVE]" : "";
          opt.text = `${m.time} | ${m.sport} | ${m.teamA} vs ${m.teamB} ${liveTxt}`;
          select.appendChild(opt);
        });
      })
      .catch(err => select.innerHTML = '<option value="">โหลดข้อมูลล้มเหลว</option>');
  }

  // เรียกใช้โหลดตอนเปิดหน้า
  loadMatches();

  // ฟังก์ชัน 1: บันทึกคะแนน (เหมือนเดิม)
  function submitScore() {
    const payload = {
      action: 'updateAdmin',
      teamId: document.getElementById('teamId').value,
      addScore: parseInt(document.getElementById('addScore').value) || 0,
      addWins: parseInt(document.getElementById('addWins').value) || 0,
      addLosses: parseInt(document.getElementById('addLosses').value) || 0
    };
    sendData(payload, 'btnScore', 'statusScore', () => {
      document.getElementById('addScore').value = "0";
      document.getElementById('addWins').value = "0";
      document.getElementById('addLosses').value = "0";
    });
  }

  // ฟังก์ชัน 2: เพิ่มตารางแข่ง
  function addMatch() {
    const payload = {
      action: 'addMatch',
      time: document.getElementById('mTime').value,
      sport: document.getElementById('mSport').value,
      teamA: document.getElementById('mTeamA').value,
      teamB: document.getElementById('mTeamB').value,
      live: document.getElementById('mLive').value
    };
    if(!payload.time || !payload.sport) {
      document.getElementById('statusAddMatch').innerText = "⚠️ กรุณาใส่เวลาและกีฬาให้ครบ";
      document.getElementById('statusAddMatch').style.color = "#ef4444";
      return;
    }
    sendData(payload, 'btnAddMatch', 'statusAddMatch', () => {
      document.getElementById('mTime').value = "";
      document.getElementById('mSport').value = "";
      setTimeout(loadMatches, 1500); // รีโหลดรายชื่อแมตช์ในช่องลบใหม่
    });
  }

  // ฟังก์ชัน 3: ลบตารางแข่ง
  function deleteMatch() {
    const rowVal = document.getElementById('deleteMatchSelect').value;
    if(!rowVal) return;
    
    if(!confirm("คุณแน่ใจหรือไม่ที่จะลบตารางแข่งนี้?")) return;

    const payload = {
      action: 'deleteMatch',
      rowIndex: parseInt(rowVal)
    };
    
    sendData(payload, 'btnDelMatch', 'statusDelMatch', () => {
      setTimeout(loadMatches, 1500); // รีโหลดรายชื่อแมตช์ในช่องลบใหม่
    });
  }

  // ตัวจัดการการส่งข้อมูล Fetch API
  function sendData(payload, btnId, statusId, onSuccess) {
    const btn = document.getElementById(btnId);
    const statusEl = document.getElementById(statusId);
    
    btn.disabled = true;
    statusEl.innerText = "⏳ กำลังบันทึก...";
    statusEl.style.color = "#ea580c";

    fetch(API_URL, {
      method: 'POST',
      mode: 'no-cors',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    }).then(() => {
      statusEl.innerText = "✅ บันทึกสำเร็จ!";
      statusEl.style.color = "#16a34a";
      btn.disabled = false;
      if(onSuccess) onSuccess();
      setTimeout(() => statusEl.innerText = "", 4000);
    }).catch(error => {
      statusEl.innerText = "❌ เกิดข้อผิดพลาด";
      statusEl.style.color = "#ef4444";
      btn.disabled = false;
    });
  }
</script>

</body>
</html>
